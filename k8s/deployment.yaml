apiVersion: apps/v1
kind: Deployment
metadata:
  name: techcorp-support-backend
  labels:
    app: techcorp-support
spec:
  replicas: 2
  selector:
    matchLabels:
      app: techcorp-support
  template:
    metadata:
      labels:
        app: techcorp-support
    spec:
      containers:
      - name: backend
        image: techcorp-support:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: techcorp-secrets
              key: database_url
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: techcorp-secrets
              key: openai_api_key
        - name: EMAIL_USERNAME
          valueFrom:
            secretKeyRef:
              name: techcorp-secrets
              key: email_username
        - name: EMAIL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: techcorp-secrets
              key: email_password
        - name: AGENT_EMAILS
          valueFrom:
            secretKeyRef:
              name: techcorp-secrets
              key: agent_emails
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka-service:9092"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: techcorp-frontend
  labels:
    app: techcorp-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: techcorp-frontend
  template:
    metadata:
      labels:
        app: techcorp-frontend
    spec:
      containers:
      - name: frontend
        image: techcorp-frontend:latest
        ports:
        - containerPort: 3000
        env:
        - name: BACKEND_URL
          value: "http://techcorp-support-service:8000"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5